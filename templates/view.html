<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ note.title }} — NoteVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;color:#e2e8f0}

    .navbar{background:linear-gradient(135deg,#667eea,#764ba2);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 4px 20px rgba(102,126,234,.4)}
    .nav-brand{display:flex;align-items:center;gap:10px;color:white;font-size:20px;font-weight:800;text-decoration:none}
    .nav-icon{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .back-btn{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;transition:color .2s}
    .back-btn:hover{color:white}

    .page-wrap{max-width:720px;margin:3rem auto;padding:0 1.5rem}

    .note-card{background:#1e293b;border:1px solid #334155;border-radius:20px;overflow:hidden}
    .note-header{background:linear-gradient(135deg,#1e1b4b,#312e81);padding:2.5rem;position:relative}
    .note-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#8b5cf6,#60a5fa,#34d399)}
    .note-title{font-size:1.8rem;font-weight:800;color:#f1f5f9;line-height:1.3;margin-bottom:1rem}
    .note-meta{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .meta-badge{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.7);padding:5px 14px;border-radius:50px;font-size:12px;font-weight:500}

    .note-body{padding:2.5rem}
    .note-content{font-size:15px;color:#cbd5e1;line-height:1.9;white-space:pre-wrap;background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:1.5rem}

    .note-footer{padding:1.5rem 2.5rem;border-top:1px solid #1e293b;display:flex;gap:12px;justify-content:flex-end}
    .btn-back{background:#1e293b;color:#94a3b8;border:1.5px solid #334155;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s}
    .btn-back:hover{border-color:#475569;color:#e2e8f0}
    .btn-delete{background:#7f1d1d30;color:#f87171;border:1.5px solid #7f1d1d60;padding:10px 24px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:all .2s}
    .btn-delete:hover{background:#7f1d1d50}

    @keyframes slideIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .note-card{animation:slideIn .4s ease}
  </style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="/">
    <div class="nav-icon">📝</div>
    NoteVault
  </a>
  <a class="back-btn" href="/">← All Notes</a>
</nav>

<div class="page-wrap">
  <div class="note-card">
    <div class="note-header">
      <div class="note-title">{{ note.title }}</div>
      <div class="note-meta">
        <span class="meta-badge">📅 {{ note.created.strftime('%d %B %Y') }}</span>
        <span class="meta-badge">🕐 {{ note.created.strftime('%I:%M %p') }}</span>
        <span class="meta-badge">📄 {{ note.content|length }} characters</span>
      </div>
    </div>
    <div class="note-body">
      <div class="note-content">{{ note.content }}</div>
    </div>
    <div class="note-footer">
      <a class="btn-back" href="/">← Back</a>
      <a class="btn-delete" href="/delete/{{ note.id }}">🗑 Delete Note</a>
    </div>
  </div>
</div>

</body>
</html>
