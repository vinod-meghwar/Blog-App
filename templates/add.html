<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Add Note — NoteVault</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;color:#e2e8f0}

    .navbar{background:linear-gradient(135deg,#667eea,#764ba2);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:0 4px 20px rgba(102,126,234,.4)}
    .nav-brand{display:flex;align-items:center;gap:10px;color:white;font-size:20px;font-weight:800;text-decoration:none}
    .nav-icon{width:36px;height:36px;background:rgba(255,255,255,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
    .back-btn{color:rgba(255,255,255,.8);text-decoration:none;font-size:13px;font-weight:500;display:flex;align-items:center;gap:6px;transition:color .2s}
    .back-btn:hover{color:white}

    .page-wrap{max-width:680px;margin:3rem auto;padding:0 1.5rem}

    .form-card{background:#1e293b;border:1px solid #334155;border-radius:20px;overflow:hidden}
    .form-header{background:linear-gradient(135deg,#667eea,#764ba2);padding:2rem;text-align:center}
    .form-header h2{color:white;font-size:22px;font-weight:800;margin-bottom:.3rem}
    .form-header p{color:rgba(255,255,255,.7);font-size:13px}

    .form-body{padding:2rem}
    .form-group{margin-bottom:1.5rem}
    .form-label{display:block;font-size:12px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:.6rem}
    .form-input{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:12px;padding:12px 16px;color:#f1f5f9;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:all .25s}
    .form-input:focus{border-color:#8b5cf6;box-shadow:0 0 0 4px rgba(139,92,246,.12)}
    .form-input::placeholder{color:#475569}
    .form-textarea{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:12px;padding:12px 16px;color:#f1f5f9;font-size:15px;font-family:'Inter',sans-serif;outline:none;transition:all .25s;resize:vertical;min-height:180px;line-height:1.7}
    .form-textarea:focus{border-color:#8b5cf6;box-shadow:0 0 0 4px rgba(139,92,246,.12)}
    .form-textarea::placeholder{color:#475569}

    .char-count{font-size:11px;color:#475569;text-align:right;margin-top:4px}

    .form-actions{display:flex;gap:12px;margin-top:2rem}
    .btn-save{flex:1;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;padding:14px;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;font-family:'Inter',sans-serif}
    .btn-save:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 8px 24px rgba(102,126,234,.4)}
    .btn-cancel{background:#0f172a;color:#94a3b8;border:1.5px solid #334155;padding:14px 24px;border-radius:12px;font-size:14px;font-weight:600;text-decoration:none;display:flex;align-items:center;justify-content:center;transition:all .2s}
    .btn-cancel:hover{border-color:#475569;color:#e2e8f0}

    @keyframes slideIn{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    .form-card{animation:slideIn .4s ease}
  </style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="/">
    <div class="nav-icon">📝</div>
    NoteVault
  </a>
  <a class="back-btn" href="/">← Back to Notes</a>
</nav>

<div class="page-wrap">
  <div class="form-card">
    <div class="form-header">
      <h2>✏️ Write a New Note</h2>
      <p>Apne ideas, tasks ya thoughts save karo</p>
    </div>
    <div class="form-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Title</label>
          <input class="form-input" name="title" placeholder="Note ka title likho..." required maxlength="200"/>
        </div>
        <div class="form-group">
          <label class="form-label">Content</label>
          <textarea class="form-textarea" name="content" id="content" placeholder="Yahan apna note likho..." required oninput="updateCount()"></textarea>
          <div class="char-count" id="char-count">0 characters</div>
        </div>
        <div class="form-actions">
          <button class="btn-save" type="submit">Save Note →</button>
          <a class="btn-cancel" href="/">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
function updateCount(){
  const len = document.getElementById('content').value.length;
  document.getElementById('char-count').textContent = len + ' characters';
}
</script>
</body>
</html>
